services:
  mongo:
    image: mongo:7
    container_name: go-assignment-mongo-prod
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./Server
      dockerfile: Dockerfile.prod
    container_name: go-assignment-server-prod
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/go-assignment
    ports:
      - "5000:5000"

  client:
    build:
      context: ./Client
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    container_name: go-assignment-client-prod
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mongo_data: